# Server configuration
server.port=${SERVER_PORT:8082}
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
internal.service-token=${INTERNAL_SERVICE_TOKEN:}

# Database configuration. Defaults remain SQLite for lightweight local runs.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:${user.dir}/photo.db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Face model integration
face.model.enabled=${FACE_MODEL_ENABLED:true}
face.model.base-url=${FACE_MODEL_BASE_URL:http://127.0.0.1:8001}
face.model.infer-path=${FACE_MODEL_INFER_PATH:/api/v1/infer}
face.model.timeout-ms=${FACE_MODEL_TIMEOUT_MS:120000}
face.model.covers-dir=${FACE_MODEL_COVERS_DIR:covers}

# PhalTs multimodal search integration (deprecated, kept for reference)
phal.ts.enabled=false
phal.ts.base-url=http://127.0.0.1:8002
phal.ts.timeout-ms=120000

# RAG Vector Service integration
rag.enabled=${RAG_ENABLED:true}
rag.base-url=${RAG_BASE_URL:http://127.0.0.1:8003}
rag.timeout-ms=${RAG_TIMEOUT_MS:60000}
rag.top-k=${RAG_TOP_K:10}
rag.service-token=${RAG_SERVICE_TOKEN:${internal.service-token}}

# RAG LLM configuration (OpenAI-compatible API, e.g. Dashscope)
rag.llm.enabled=${RAG_LLM_ENABLED:true}
rag.llm.api-key=${RAG_LLM_API_KEY:}
rag.llm.base-url=${RAG_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
rag.llm.model=${RAG_LLM_MODEL:qwen-vl-max}
rag.llm.timeout-ms=${RAG_LLM_TIMEOUT_MS:120000}

# RAG search score threshold (0.0~1.0, cosine similarity)
rag.search.score-threshold=${RAG_SEARCH_SCORE_THRESHOLD:0.45}

# RAG chat max reference images
rag.chat.max-references=${RAG_CHAT_MAX_REFERENCES:20}

# File storage paths
upload.base-path=${UPLOAD_BASE_PATH:uploads}
upload.temp-path=${UPLOAD_TEMP_PATH:uploads/temp}
avatar.base-path=${AVATAR_BASE_PATH:avatars}
