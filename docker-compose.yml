services:
  frontend:
    build:
      context: ./album-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./album-backend
    expose:
      - "8082"
    env_file:
      - ./album-backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      UPLOAD_BASE_PATH: /data/uploads
      UPLOAD_TEMP_PATH: /data/uploads/temp
      AVATAR_BASE_PATH: /data/avatars
      FACE_MODEL_BASE_URL: http://face-recognition:8001
      FACE_MODEL_COVERS_DIR: /data/covers
      RAG_BASE_URL: http://rag:8003
    volumes:
      - ./data/backend:/data
    depends_on:
      mysql:
        condition: service_healthy
      face-recognition:
        condition: service_started
      rag:
        condition: service_started

  init-users:
    profiles:
      - init
    image: python:3.12-slim
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:?INIT_ADMIN_USERNAME is required}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:?INIT_ADMIN_PASSWORD is required}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:?INIT_ADMIN_EMAIL is required}
      INIT_ADMIN_NICKNAME: ${INIT_ADMIN_NICKNAME:?INIT_ADMIN_NICKNAME is required}
      INIT_USER_USERNAME: ${INIT_USER_USERNAME:?INIT_USER_USERNAME is required}
      INIT_USER_PASSWORD: ${INIT_USER_PASSWORD:?INIT_USER_PASSWORD is required}
      INIT_USER_EMAIL: ${INIT_USER_EMAIL:?INIT_USER_EMAIL is required}
      INIT_USER_NICKNAME: ${INIT_USER_NICKNAME:?INIT_USER_NICKNAME is required}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "-c", "pip install --no-cache-dir pymysql bcrypt && python /scripts/init-mysql.py"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

  face-recognition:
    build:
      context: ./face-recognition
    env_file:
      - ./album-backend/.env
    expose:
      - "8001"
    volumes:
      - ./data/face-recognition/models:/app/models

  rag:
    build:
      context: ./album-rag
    expose:
      - "8003"
    env_file:
      - ./album-backend/.env
      - ./album-rag/.env
    environment:
      QDRANT_PATH: /data/qdrant
      COLLECTION_NAME: photo_rag
      EMBEDDING_MODEL: /app/models/bge-small-zh-v1.5
    volumes:
      - ./data/rag:/data
