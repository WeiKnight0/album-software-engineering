services:
  frontend:
    build:
      context: ./album-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./album-backend
    expose:
      - "8082"
    env_file:
      - ./album-backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/photo.db
      UPLOAD_BASE_PATH: /data/uploads
      UPLOAD_TEMP_PATH: /data/uploads/temp
      AVATAR_BASE_PATH: /data/avatars
      FACE_MODEL_BASE_URL: http://face-recognition:8001
      FACE_MODEL_COVERS_DIR: /data/covers
      RAG_BASE_URL: http://rag:8003
    volumes:
      - ./data/backend:/data
    depends_on:
      face-recognition:
        condition: service_started
      rag:
        condition: service_started

  init-users:
    profiles:
      - init
    build:
      context: ./album-backend
    env_file:
      - ./album-backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/photo.db
      UPLOAD_BASE_PATH: /data/uploads
      UPLOAD_TEMP_PATH: /data/uploads/temp
      AVATAR_BASE_PATH: /data/avatars
      FACE_MODEL_BASE_URL: http://face-recognition:8001
      FACE_MODEL_COVERS_DIR: /data/covers
      RAG_BASE_URL: http://rag:8003
      app.bootstrap.enabled: "true"
    volumes:
      - ./data/backend:/data
    depends_on:
      face-recognition:
        condition: service_started
      rag:
        condition: service_started
    command: ["--app.bootstrap.enabled=true", "--server.port=0"]

  face-recognition:
    build:
      context: ./face-recognition
    env_file:
      - ./album-backend/.env
    expose:
      - "8001"
    volumes:
      - ./data/face-recognition/models:/app/models

  rag:
    build:
      context: ./album-rag
    expose:
      - "8003"
    env_file:
      - ./album-backend/.env
      - ./album-rag/.env
    environment:
      QDRANT_PATH: /data/qdrant
      COLLECTION_NAME: photo_rag
      EMBEDDING_MODEL: /app/models/bge-small-zh-v1.5
    volumes:
      - ./data/rag:/data
